<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>James Gardner | In progress projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
    <a class="nav-logo" href="index.html">James</a>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="completed.html">Completed Projects</a></li>
        <li><a href="inprogress.html">In Progress Projects</a></li>
        <li><a href="about.html">About</a></li>
    </ul>
</nav>

<div class="page-header">
    <h1>In progress</h1>
    <p>Projects I'm actively developing. Expect rough edges, this is the work in motion.</p>
</div>

<section class="timeline" id="timeline"></section>

<script>
    const projects = [
        {
            month: "TBD",
            year:  "2026",
            title: "Terminal Horizon",
            role:  ["Programmer"],
            teamSize: 60,
            description:
                "Add Description",
            gif1:      "",
            gif2:      "",
            link:      "https://store.steampowered.com/app/4358600/Terminal_Horizon/",
            linkLabel: "Wishlist on Steam",
        },

    ];

    const externalIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

    function mediaEl(src, alt) {
        if (src) return `<img src="${src}" alt="${alt}" loading="lazy" />`;
        return `<div class="gif-placeholder">GIF placeholder</div>`;
    }

    const container = document.getElementById('timeline');

    projects.forEach((p, i) => {
        const isOdd = i % 2 === 0;

        const linkBtn = p.link
            ? `<a class="card-link" href="${p.link}" target="_blank" rel="noopener">${externalIcon} ${p.linkLabel}</a>`
            : '';

        const card = `
    <div class="entry-card">
      <div class="card-meta">
        ${p.role.map(r => `<span class="card-role">${r}</span>`).join('')}
        <span class="card-status in-progress">In progress</span>
      </div>
      <h2>${p.title}</h2>
      <p class="card-team"> <strong>Team Size:</strong> ${p.teamSize} ${p.teamSize === 1 ? 'person' : 'people'}</p>
      <p>${p.description}</p>
      <div class="card-media">
        ${mediaEl(p.gif1, p.title + ' preview 1')}
        ${mediaEl(p.gif2, p.title + ' preview 2')}
      </div>
      ${linkBtn}
    </div>`;

        const node = `
    <div class="entry-node">
      <div class="node-dot"></div>
      <div class="node-date">${p.month}<br/>${p.year}</div>
    </div>`;

        const empty = `<div class="entry-empty"></div>`;

        const entry = document.createElement('div');
        entry.className = 'entry';
        entry.innerHTML = isOdd
            ? card + node + empty
            : empty + node + card;

        container.appendChild(entry);
    });
</script>

<script src="nav.js"></script>
</body>
</html>
