<div class="page-header">
    <h1>In progress</h1>
    <p>Projects I'm actively working on or planned future projects</p>
</div>

<section class="timeline" id="timeline"></section>

<script>
    const projects = [
        {
            month: "TBD",
            year: "2026",
            title: "Terminal Horizon",
            role: ["Programmer"],
            teamSize: 60,
            description:
                "Terminal Horizon is a cyberpunk turn-based tactics roguelike and is my first experience working in an indie studio environment. " +
                "The Playmakers Development Team is a mid size indie studio where members are split into smaller teams based on discipline. "+
                "I work as a programmer focusing mainly on the games combat systems. " +
                "Since the game has not yet released I cannot share to much information in regards to the game itself.",
            link:  "https://store.steampowered.com/app/4358600/Terminal_Horizon/",
            linkLabel: "Wishlist on Steam",
        },
        {
            month: "TBD",
            year: "2026",
            title: "Unnamed Unreal Project",
            role: ["Lead Programmer"],
            teamSize: 2,
            description:
                "This project has not yet begun but it will be a 3D Unreal project focusing on AI systems, terrain generation and multiplayer networking.",
            link:  "",
            linkLabel: "Not Yet Available",
        },
        {
            month: "TBD",
            year: "2026",
            title: "Unnamed Unity Project",
            role: ["Level Designer", "Programmer"],
            teamSize: 6,
            description:
                "This project has not yet begun but it will be final capstone project of my degree and will expanded to the scope where it can be published on Steam.",
            link:  "",
            linkLabel: "Not Yet Available",
        },

    ];

    const externalIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

    const container = document.getElementById('timeline');

    projects.forEach((p, i) => {
        const isOdd = i % 2 === 0;

        const linkBtn = p.link
            ? `<a class="card-link" href="${p.link}" target="_blank" rel="noopener">${externalIcon} ${p.linkLabel}</a>`
            : '';

        const card = `
            <div class="entry-card">
              <div class="card-meta">
                ${p.role.map(r => `<span class="card-role">${r}</span>`).join('')}
                <span class="card-status in-progress">In progress</span>
              </div>
              <h2>${p.title}</h2>
              <p class="card-team"> <strong>Team Size:</strong> ${p.teamSize} ${p.teamSize === 1 ? 'person' : 'people'}</p>
              <p>${p.description}</p>
              ${linkBtn}
            </div>`;

        const node = `
            <div class="entry-node">
              <div class="node-dot"></div>
              <div class="node-date">${p.month}<br/>${p.year}</div>
            </div>`;

        const empty = `<div class="entry-empty"></div>`;

        const entry = document.createElement('div');
        entry.className = 'entry';
        entry.innerHTML = isOdd
            ? card + node + empty
            : empty + node + card;

        container.appendChild(entry);
    });
</script>

<script src="nav.js"></script>
</body>
</html>
