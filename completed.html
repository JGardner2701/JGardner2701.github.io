<div class="page-header">
    <h1>Completed projects</h1>
    <p>A timeline of completed games and interactive experiences, from most to least recent.</p>
</div>

<section class="timeline" id="timeline"></section>

<script>
    const projects = [
        {
            month: "June",
            year: "2026",
            title: "Trapped & Lost",
            role: ["Lead Programmer", "Cinematography Director", "Audio Engineer"],
            teamSize: 3,
            description: "Trapped & Lost is a 3D interactive experience built in Unity. " +
                "The experience has multiple endings and story paths based on the choices that the player picks. " +
                "Through this project I combined my knowledge on film making, games interacting coding and audio design to create a blend of my two passions.",
            bgVideo: "/assets/videos/trapped&LostPreview.mp4",
            link: "https://youtu.be/0MAnulp7AvU?si=5KqZraUGvnl-yop1",
            linkLabel: "Watch on YouTube"
        },
        {
            month: "May",
            year: "2026",
            title: "Cyberfunk /4/4",
            role: ["Game Designer", "VFX Programmer", "Audio Engineer"],
            teamSize: 6,
            description: "Cyberfunk /4/4 is a rhythm action rougelike, where the player needs to escape a laboratory by unlocking new abilities, solving puzzles, and most important of all parrying enemy attacks to the rhythm. " +
                "During this project, I worked with FMOD to effectively integrate rhythm mechanics and audio. " +
                "Additionally, I also worked on the Visual effects for the game, mostly working with Lighting, Shaders and Particle systems.",
            bgVideo: "/assets/videos/cyberfunkPreview.mp4",
            link: "https://e2ik.itch.io/cyberfunk-44",
            linkLabel: "Play on Itch.io"
        },
        {
            month: "March",
            year: "2026",
            title: "Treasure Hunter in the Abyss",
            role: ["Level Designer", "Programmer"],
            teamSize: 5,
            description: "Treasure Hunter in the Abyss was a one week project where we had to create a game using a provided game design document which was based off an unknown Atari game. " +
                "During this project I worked on player movement and rigid bodies, I also implemented the lighting system. " +
                "I also was one of the level designers for the project where I used my experience with precisions platformers to craft a challenging yet rewarding final level.",
            bgVideo: "/assets/videos/treasureHunterPreview.mp4",
            link: "https://e2ik.itch.io/treasurehunter",
            linkLabel: "Play on Itch.io"
        },
        {
            month: "May",
            year: "2025",
            title: "Time Slime",
            role: ["Lead Programmer", "Level Designer"],
            teamSize: 4,
            description:
                "Time Slime is a precision platformer, that makes the most out of Unity's 2D physics engine. " +
                "I was the lead programmer working on a majority of core features. " +
                "Additionally, I worked as a level designer on this project, this involved me conducting multiple playtests after which I would analyse the feedback and iteratively integrate it into the game feel and level design.",
            bgVideo: "/assets/videos/timeSlimePreview.mp4",
            link: "https://agency-games.itch.io/time-cave",
            linkLabel: "Play on Itch.io"
        }
    ];


    const externalIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

    function bgVideoEl(src) {
        if (!src) return '';
        return `
            <div class="entry-bg-video-wrap">
              <video class="entry-bg-video" autoplay muted loop playsinline>
                <source src="${src}" type="video/mp4" />
              </video>
            </div>`;
    }

    const container = document.getElementById('timeline');

    projects.forEach((p, i) => {
        const isOdd = i % 2 === 0;

        const card = `
            <div class="entry-card">
              <div class="card-meta">
                ${Array.isArray(p.role) ? p.role.map(r => `<span class="card-role">${r}</span>`).join('') : `<span class="card-role">${p.role}</span>`}
              </div>
              <h2>${p.title}</h2>
              ${p.teamSize ? `<p class="card-team"><strong>Team Size:</strong> ${p.teamSize} ${p.teamSize === 1 ? 'person' : 'people'}</p>` : ''}
              <p class="card-text">${p.description}</p>
               <a class="card-link" href="${p.link}" target="_blank" rel="noopener">
                ${externalIcon} ${p.linkLabel}
              </a>
            </div>`;

                const node = `
            <div class="entry-node">
              <div class="node-dot"></div>
              <div class="node-date">${p.month}<br/>${p.year}</div>
            </div>`;

        const empty = `<div class="entry-empty"></div>`;

        const entry = document.createElement('div');
        entry.className = 'entry';
        entry.innerHTML = (isOdd
            ? card + node + empty
            : empty + node + card) + bgVideoEl(p.bgVideo);

        container.appendChild(entry);
    });
</script>

<script src="nav.js"></script>
</body>
</html>
